# Reusable workflow: build -> push to GHCR -> zero-downtime deploy on the VPS.
# The panel's "Deploy from GitHub" flow writes a caller that references this
# file; a fork can also call it directly. See workflows/deploy-template.yml for
# the copy-into-your-fork story described in the README.
name: build-and-deploy

on:
  workflow_call:
    inputs:
      app_name:
        description: "App name on the VPS (apps/<app_name>)"
        required: true
        type: string
      tag:
        description: "Tag to deploy (empty = current commit SHA)"
        required: false
        type: string
        default: ""
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # docker-container driver so `cache-to: type=gha` (below) can export.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/fast-infra
            platform deploy ${{ inputs.app_name }} ${{ inputs.tag != '' && inputs.tag || github.sha }}
            docker image prune -f
