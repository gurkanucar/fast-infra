# App-side workflow: ~10 lines, everything else lives in the reusable template.
# Replace YOUR_USER/fast-infra with your fork. This file only takes effect when
# go-hello lives in its own repository (GitHub reads workflows from .github/ at repo root).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Commit SHA to deploy (empty = this commit)"
        required: false

jobs:
  deploy:
    uses: YOUR_USER/fast-infra/.github/workflows/deploy-template.yml@main
    with:
      app_name: go-hello
      tag: ${{ inputs.tag || '' }}
    secrets: inherit
