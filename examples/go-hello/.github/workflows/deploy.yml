# App-side workflow: ~10 lines, everything else lives in the reusable template.
# Replace gurkanucar/fast-infra with your fork. This file only takes effect when
# go-hello lives in its own repository (GitHub reads workflows from .github/ at repo root).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Commit SHA to deploy (empty = this commit)"
        required: false

# The reusable workflow pushes to GHCR, so the caller must grant packages:write.
# A called workflow's token can't exceed the caller's, and repos default to
# read-only — without this the run fails at startup.
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: gurkanucar/fast-infra/.github/workflows/deploy-template.yml@main
    with:
      app_name: go-hello
      tag: ${{ inputs.tag || '' }}
    secrets: inherit
